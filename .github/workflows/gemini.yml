name: Gemini CLI Automation

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gemini:
    if: |
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@gemini') || contains(github.event.comment.body, '@google-gemini'))) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '@gemini') || contains(github.event.comment.body, '@google-gemini'))) ||
      (github.event_name == 'issues' && (github.event.action == 'opened' || contains(github.event.issue.body, '@gemini')))
    
    runs-on: ubuntu-latest
    
    permissions:
      contents: write       
      pull-requests: write  
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Gemini CLI Action
        uses: google/gemini-cli-action@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_instructions: |
            You are an expert developer assistant for 'skillscheck', a Next.js 16 (App Router) platform.
            Focus on algorithm practice, technical interview preparation, and maintaining a high-quality UI with Tailwind CSS v4.
            The project uses TypeScript in strict mode and pnpm for package management.
            Follow the architectural patterns and styling conventions defined in the project's GEMINI.md and README.md.
