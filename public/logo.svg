<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 190" width="490" height="190">
  <!-- Background -->
  <rect width="490" height="190" rx="16" ry="16" fill="#0B1628"/>
  
  <!-- "SkillsCheck" text on top -->
  <text x="245" y="95" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="0.5">
    <tspan fill="#3B9AE8">Skills</tspan><tspan fill="#FFFFFF">Check</tspan>
  </text>
  
  <!-- Code brackets </> icon - smaller, below text -->
  <!-- < bracket - separated to the left -->
  <path d="M 215 125 L 200 138 L 215 151" stroke="#3B9AE8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- / slash - together with > -->
  <line x1="247" y1="121" x2="237" y2="155" stroke="#3B9AE8" stroke-width="5" stroke-linecap="round"/>
  
  <!-- > bracket - together with / -->
  <line x1="256" y1="125" x2="271" y2="138" stroke="#3B9AE8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="271" y1="138" x2="256" y2="151" stroke="#3B9AE8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>